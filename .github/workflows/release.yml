name: Release APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci

      - name: Stamp version into app.json
        run: |
          VERSION=$(python scripts/release.py version)
          # Strip leading 'v' for semver field (e.g. v0.1.0 → 0.1.0)
          SEMVER="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.version = '${SEMVER}';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2) + '\n');
          "
          echo "Stamped version $SEMVER into app.json"

      - run: npx expo prebuild --clean

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo -n "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          echo "Keystore size: $(wc -c < android/app/release.keystore) bytes"
          echo "Keystore SHA-256: $(sha256sum android/app/release.keystore | cut -d' ' -f1)"
          keytool -list -keystore android/app/release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Build release APK
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEYSTORE_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Compute version and release notes
        id: release_info
        run: |
          VERSION=$(python scripts/release.py version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          python scripts/release.py notes > release-notes.md

      - name: Create tag
        run: |
          git tag ${{ steps.release_info.outputs.version }}
          git push origin ${{ steps.release_info.outputs.version }}

      - name: Rename APK to Atahon-{version}.apk
        run: |
          VERSION="${{ steps.release_info.outputs.version }}"
          # Remove leading 'v' for the filename (e.g. v0.1.0 → 0.1.0)
          SEMVER="${VERSION#v}"
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/Atahon-${SEMVER}.apk

      - name: Create GitHub Release
        run: |
          VERSION="${{ steps.release_info.outputs.version }}"
          SEMVER="${VERSION#v}"
          gh release create ${{ steps.release_info.outputs.version }} \
            android/app/build/outputs/apk/release/Atahon-${SEMVER}.apk \
            --title "${{ steps.release_info.outputs.version }}" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cleanup keystore
        if: always()
        run: rm -f android/app/release.keystore
