name: Release APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci

      - run: npx expo prebuild --clean

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode --ignore-garbage > android/app/release.keystore

      - name: Build release APK
        run: |
          cd android && ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEYSTORE_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Compute version and release notes
        id: release_info
        run: |
          VERSION=$(python scripts/release.py version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          python scripts/release.py notes > release-notes.md

      - name: Create tag
        run: |
          git tag ${{ steps.release_info.outputs.version }}
          git push origin ${{ steps.release_info.outputs.version }}

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.release_info.outputs.version }} \
            android/app/build/outputs/apk/release/app-release.apk \
            --title "${{ steps.release_info.outputs.version }}" \
            --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cleanup keystore
        if: always()
        run: rm -f android/app/release.keystore
